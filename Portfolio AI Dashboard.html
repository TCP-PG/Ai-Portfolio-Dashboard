            <th colSpan={4} style={{...thS(TB.burgundyDeep),height:"auto",letterSpacing:".14em",borderBottom:"1px solid rgba(255,255,255,.14)"}}>Building Blocks</th>
          </tr><tr>{BB_COLS.map((c,i)=><th key={i} style={thS(TB.burgundy)}>{c[0]}{"\n"}{c[1]}</th>)}</tr></thead>
          <tbody>{t.map((c,ri)=>{const z=ri%2?"#FCFCFD":"#fff";const lbS=c.lastBoard==="TBD"?{fontSize:10.5,fontWeight:600,color:"#8A5A12"}:{fontSize:10.5,fontWeight:500,color:TB.darkGray};return<tr key={c.id} style={{background:z}}>
            <td style={{...tdS,textAlign:"left",position:"sticky",left:0,background:z,boxShadow:"1px 0 0 #ECEDF0"}}><NameCell c={c}/></td>
            <td style={tdS}><span style={lbS}>{c.lastBoard||""}</span></td>
            <td style={tdS}><span style={{fontSize:10.5,color:TB.darkGray}}>{c.bbDate||c.bpDate||""}</span></td>
            {c.bb.map((v,i)=><td key={i} style={{...tdS,padding:"6px 4px"}}><HML v={v}/></td>)}
          </tr>;})}
          </tbody>
        </table></div>
      </div>;
    }

    function ValueTab({rows}){
      const t=[...rows].sort((a,b)=>a.name.localeCompare(b.name));
      if(!t.length)return<div style={{padding:40,textAlign:"center",color:TB.medGray,fontSize:13}}>No companies match the current filters.</div>;
      return<div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:"8px 16px",padding:"11px 20px 13px",borderBottom:"1px solid #EEEFF2",fontSize:10.5}}>
          {[[GREEN.c,"Realized"],[TB.navy,"Targets"],[TB.burgundy,"Economics"]].map(([col,lbl])=><span key={lbl} style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:9,height:9,borderRadius:2,background:col,display:"inline-block"}}/>{lbl}</span>)}
          {Object.entries(HML_FULL).map(([k,v])=><span key={k} style={{display:"flex",alignItems:"center",gap:6,color:TB.darkGray}}><HML v={k}/> {v}</span>)}
          <span style={{color:TB.medGray}}>· <i>n/d</i> = not disclosed · Figures in source currency</span>
        </div>
        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed",minWidth:1356}}>
          <colgroup><col style={{width:168}}/><col style={{width:84}}/><col style={{width:68}}/><col style={{width:76}}/><col style={{width:80}}/><col style={{width:108}}/><col style={{width:72}}/><col style={{width:96}}/><col style={{width:96}}/><col style={{width:88}}/><col style={{width:72}}/><col style={{width:96}}/><col style={{width:72}}/><col style={{width:84}}/><col style={{width:196}}/></colgroup>
          <thead><tr>
            <th style={{...thS(TB.navy),textAlign:"left",position:"sticky",left:0,zIndex:3}}>Company</th>
            <th style={thS(TB.burgundy)}>Total{"\n"}Spend</th>
            <th style={thS(TB.burgundy)}>ROI</th>
            <th style={thS(TB.burgundy)}>AI Equity{"\n"}Story</th>
            <th style={thS(TB.burgundy)}>AI DD{"\n"}Readiness</th>
            <th style={thS(TB.burgundy)}>AI Market{"\n"}Comms</th>
            <th style={thS(TB.navy)}>Updated</th>
            <th style={thS(TB.navy)}>Realized{"\n"}Revenue</th>
            <th style={thS(TB.navy)}>Realized{"\n"}Cost Savings</th>
            <th style={thS(TB.navy)}>Target{"\n"}Revenue</th>
            <th style={thS(TB.navy)}>Target{"\n"}Rev Date</th>
            <th style={thS(TB.navy)}>Target{"\n"}Cost Savings</th>
            <th style={thS(TB.navy)}>Target{"\n"}Cost Date</th>
            <th style={thS(TB.navy)}>AI{"\n"}Investment</th>
            <th style={{...thS(TB.navy),textAlign:"left"}}>Comment / Note</th>
          </tr></thead>
          <tbody>{t.map((c,ri)=>{const z=ri%2?"#FCFCFD":"#fff";return<tr key={c.id} style={{background:z}}>
            <td style={{...tdS,textAlign:"left",position:"sticky",left:0,background:z,boxShadow:"1px 0 0 #ECEDF0"}}><NameCell c={c}/></td>
            <td style={{...tdS,background:ri%2?"#F9F5F7":"#FBF7F9"}}><Money v={c.spend} col={TB.burgundy}/></td>
            <td style={{...tdS,background:ri%2?"#F9F5F7":"#FBF7F9"}}><Money v={c.roi} col={TB.burgundy}/></td>
            <td style={{...tdS,background:ri%2?"#F9F5F7":"#FBF7F9"}}><HML v={c.equity}/></td>
            <td style={{...tdS,background:ri%2?"#F9F5F7":"#FBF7F9"}}><HML v={c.ddReady}/></td>
            <td style={{...tdS,background:ri%2?"#F9F5F7":"#FBF7F9"}}><Comms v={c.comms}/></td>
            <td style={tdS}><span style={{fontSize:10,color:TB.darkGray}}>{c.vcDate||""}</span></td>
            <td style={tdS}><Money v={c.rRev} col={GREEN.c}/></td>
            <td style={tdS}><Money v={c.rCost} col={GREEN.c}/></td>
            <td style={tdS}><Money v={c.tRev} col={TB.navy}/></td>
            <td style={tdS}><span style={{fontSize:10,color:c.tRevD?TB.navy:TB.lightGray,fontWeight:500}}>{c.tRevD||""}</span></td>
            <td style={tdS}><Money v={c.tCost} col={TB.navy}/></td>
            <td style={tdS}><span style={{fontSize:10,color:c.tCostD?TB.navy:TB.lightGray,fontWeight:500}}>{c.tCostD||""}</span></td>
            <td style={tdS}>{c.inv?<span style={{fontWeight:600,color:TB.burgundy,fontSize:10.5}}>{c.inv}</span>:null}</td>
            <td style={{...tdS,textAlign:"left"}}>{c.note?<span style={{fontSize:10,color:TB.darkGray,lineHeight:1.4}}>{c.note}</span>:null}</td>
          </tr>;})}
          </tbody>
        </table></div>
      </div>;
    }

    function Dashboard() {
      const [page, setPage] = useState("value");
      const [geo, setGeo] = useState("All");
      const [fund, setFund] = useState("All");
      const [q, setQ] = useState("");
      const [liveData, setLiveData] = useState(null);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [fetching, setFetching] = useState(false);
      const [refreshTick, setRefreshTick] = useState(0);

      useEffect(() => {
        const load = async () => {
          setFetching(true);
          try {
            const r = await fetch(PA_URL, {method:"POST", mode:"cors"});
            if (!r.ok) throw new Error(r.status);
            let text = await r.text();
            if (text && !/[\n,]/.test(text.slice(0,80)) && /^[A-Za-z0-9+/=]{20,}$/.test(text.replace(/\s/,''))) {
              try { text = atob(text); } catch(e) {}
            }
            const parsed = parseCSV(text);
            if (parsed.length >= 5) { setLiveData(parsed); setLastUpdated(new Date()); }
          } catch(e) { console.warn("Dashboard fetch error:", e.message); }
          setFetching(false);
        };
        load();
        const id = setInterval(load, 120000);
        return () => clearInterval(id);
      }, [refreshTick]);

      const activeData = liveData || DATA;
      const filtered = activeData.filter(c => {
        if(geo!=="All"&&c.geo!==geo)return false;
        if(fund!=="All"){
          if(fund==="Delta"){if(!/Delta/.test(c.fund||""))return false;}
          else if(fund==="PE"){if(!/PE/.test(c.fund||""))return false;}
          else if(c.fund!==fund)return false;
        }
        if(q&&!c.name.toLowerCase().includes(q.toLowerCase()))return false;
        return true;
      });

      const tabs=[{k:"value",label:"Quantified Value Creation"},{k:"blueprint",label:"AI Blueprint"},{k:"blocks",label:"AI Exit Readiness"}];
      const geos=["All","Europe","US"],funds=["All","PE","TSO","Delta"];
      const nbtn=(active)=>({background:active?"rgba(255,255,255,.16)":"transparent",border:`1px solid ${active?"rgba(255,255,255,.5)":"rgba(255,255,255,.22)"}`,borderRadius:5,padding:"5px 13px",fontSize:11,cursor:"pointer",color:active?"#fff":"rgba(255,255,255,.62)",fontWeight:active?600:400,fontFamily:"inherit",transition:"all .12s",whiteSpace:"nowrap"});
      const tbtn=(active)=>({background:active?"#fff":"rgba(255,255,255,.1)",border:`1px solid ${active?"#fff":"rgba(255,255,255,.2)"}`,borderRadius:7,padding:"7px 20px",fontSize:12,fontWeight:600,cursor:"pointer",color:active?"#003A8C":"rgba(255,255,255,.65)",fontFamily:"inherit",letterSpacing:".02em",transition:"all .15s"});
      const cardHead=(col)=>({padding:"16px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-end",borderBottom:"1px solid #EEEFF2",borderLeft:`3px solid ${col}`});

      return(
        <div style={{fontFamily:"system-ui,-apple-system,'Segoe UI',Arial,sans-serif",background:"#F1F2F5",color:"#4C4F54",minHeight:"100vh"}}>
          <div style={{background:"linear-gradient(180deg,#00216A 0%,#001A52 100%)",boxShadow:"0 1px 0 rgba(0,0,0,.1)"}}>
            <div style={{padding:"0 28px",display:"flex",justifyContent:"space-between",alignItems:"center",height:56,flexWrap:"wrap",gap:12,maxWidth:1680,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <svg height="20" viewBox="0 0 200 30" xmlns="http://www.w3.org/2000/svg"><text x="0" y="22" fontFamily="system-ui,-apple-system,sans-serif" fontSize="18" fontWeight="700" fill="white" letterSpacing="1">TowerBrook</text></svg>
                <div style={{width:1,height:22,background:"rgba(255,255,255,.25)"}}/>
                <span style={{color:"#fff",fontSize:13.5,fontWeight:600,letterSpacing:".02em"}}>Portfolio AI Dashboard</span>
                <span style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:10,color:"rgba(255,255,255,.55)"}}>
                  <span style={{width:6,height:6,background:liveData?"#4ADE80":"#94A3B8",borderRadius:"50%",animation:liveData?"blink 2.5s ease-in-out infinite":"none"}}/>
                  {lastUpdated?`Live · ${lastUpdated.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`:fetching?"Connecting…":"30 Jun 2026"}
                  <button onClick={()=>setRefreshTick(t=>t+1)} disabled={fetching} title="Refresh data" style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.25)",borderRadius:4,color:"rgba(255,255,255,.7)",cursor:fetching?"not-allowed":"pointer",fontSize:11,padding:"2px 7px",fontFamily:"inherit",lineHeight:1.4,transition:"all .12s"}}>{fetching?"…":"↻"}</button>
                </span>
              </div>
              <div style={{display:"flex",gap:14,alignItems:"center"}}>
                <div style={{display:"flex",gap:4}}>{geos.map(g=><button key={g} style={nbtn(geo===g)} onClick={()=>{setGeo(g);setQ("");}}>{g==="Europe"?"EU":g}</button>)}</div>
                <div style={{width:1,height:18,background:"rgba(255,255,255,.22)"}}/>
                <div style={{display:"flex",gap:4}}>{funds.map(f=><button key={f} style={nbtn(fund===f)} onClick={()=>{setFund(f);setQ("");}}>{f}</button>)}</div>
              </div>
            </div>
          </div>
          <div style={{background:"#003A8C",borderTop:"1px solid rgba(255,255,255,.15)"}}>
            <div style={{padding:"0 22px",display:"flex",alignItems:"center",gap:6,maxWidth:1680,margin:"0 auto",height:46}}>
              {tabs.map(t=><button key={t.k} style={tbtn(page===t.k)} onClick={()=>{setPage(t.k);setQ("");}}>{t.label}</button>)}
            </div>
          </div>
          <div style={{padding:"22px 28px 44px",maxWidth:1680,margin:"0 auto"}}>
            <Summary rows={filtered}/>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
              <input style={{fontSize:12.5,fontFamily:"inherit",border:"1px solid #E4E5E9",borderRadius:8,padding:"9px 13px",width:220,color:TB.navy,background:"#fff",outline:"none"}} placeholder="Search company…" value={q} onChange={e=>setQ(e.target.value)}/>
              {q&&<span style={{fontSize:11.5,color:TB.medGray}}>{filtered.length} matches</span>}
            </div>
            <div style={{background:"#fff",border:"1px solid #E4E5E9",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 2px rgba(0,33,106,.04),0 6px 20px rgba(0,33,106,.045)",marginBottom:18}}>
              {page==="value"&&<><div style={cardHead(TB.burgundy)}><div><div style={{fontSize:14,fontWeight:700,color:TB.navy}}>Quantified AI Value Creation</div><div style={{fontSize:11.5,color:TB.medGray,marginTop:3}}>AI economics alongside realized and targeted revenue, cost savings and investment</div></div><span style={{fontSize:11.5,color:TB.medGray,whiteSpace:"nowrap"}}>{filtered.filter(hasVC).length} companies</span></div><ValueTab rows={filtered}/></>}
              {page==="blueprint"&&<><div style={cardHead(TB.navy)}><div><div style={{fontSize:14,fontWeight:700,color:TB.navy}}>AI Blueprint</div><div style={{fontSize:11.5,color:TB.medGray,marginTop:3}}>Operating-model readiness across the 7 AI blueprint pillars</div></div><span style={{fontSize:11.5,color:TB.medGray,whiteSpace:"nowrap"}}>{filtered.filter(hasBP).length} companies</span></div><BlueprintTab rows={filtered}/></>}
              {page==="blocks"&&<><div style={cardHead(TB.burgundy)}><div><div style={{fontSize:14,fontWeight:700,color:TB.navy}}>AI Exit Readiness</div><div style={{fontSize:11.5,color:TB.medGray,marginTop:3}}>AI equity story building blocks, DD readiness, market comms positioning and equity story readiness</div></div><span style={{fontSize:11.5,color:TB.medGray,whiteSpace:"nowrap"}}>{filtered.filter(c=>hasEQ(c)||hasBP(c)).length} companies</span></div><BlocksTab rows={filtered}/></>}
            </div>
            <div style={{marginTop:16,fontSize:10.5,color:TB.medGray,textAlign:"center"}}>
              TowerBrook Capital Partners · Portfolio AI Engagement Tracker ·{" "}
              {lastUpdated?`Live data · refreshed ${lastUpdated.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})} · auto-refresh every 2 min`:"Data as of 30 Jun 2026"}
            </div>
          </div>
          <style>{`@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
